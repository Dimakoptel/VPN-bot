version: '3.8'

services:
  # NexusBot Application
  nexusbot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexusbot
    restart: unless-stopped
    environment:
      # Bot Configuration - ЗАМЕНИТЕ НА РЕАЛЬНЫЕ ЗНАЧЕНИЯ
      - BOT_TOKEN=${BOT_TOKEN:-1234567890:AABBccDDeeFFggHHiiJJkkLLmmNNoO}
      - BOT_ADMIN_IDS=${BOT_ADMIN_IDS:-123456789,987654321}
      
      # Database - по умолчанию SQLite, для PostgreSQL измените на postgresql+asyncpg://user:password@db:5432/nexusbot
      - DATABASE_URL=${DATABASE_URL:-sqlite+aiosqlite:///app/data/nexusbot.db}
      
      # License Server (optional)
      - LICENSE_SERVER_URL=${LICENSE_SERVER_URL:-https://your-license-server.com/validate}
      - LICENSE_KEY=${LICENSE_KEY:-}
      
      # Payment Provider
      - PAYMENT_PROVIDER_TOKEN=${PAYMENT_PROVIDER_TOKEN:-your_payment_token}
      - PAYMENT_CURRENCY=${PAYMENT_CURRENCY:-RUB}
      
      # VPN Panel Integration
      - VPN_PANEL_URL=${VPN_PANEL_URL:-http://localhost:8080}
      - VPN_PANEL_LOGIN=${VPN_PANEL_LOGIN:-admin}
      - VPN_PANEL_PASSWORD=${VPN_PANEL_PASSWORD:-secure_password}
      
      # App Settings
      - APP_NAME=${APP_NAME:-NexusBot}
      - APP_VERSION=${APP_VERSION:-1.0.0}
      - SUPPORT_USERNAME=${SUPPORT_USERNAME:-@nexus_support}
      
      # Redis (optional)
      - REDIS_URL=${REDIS_URL:-redis://localhost:6379/0}
      
      # Logging Configuration
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FILE=${LOG_FILE:-/var/log/nexusbot/bot.log}
      - LOG_MAX_BYTES=${LOG_MAX_BYTES:-10485760}
      - LOG_BACKUP_COUNT=${LOG_BACKUP_COUNT:-5}
      
      # Monitoring Configuration
      - PROMETHEUS_ENABLED=${PROMETHEUS_ENABLED:-false}
      - PROMETHEUS_PORT=${PROMETHEUS_PORT:-9090}
    
    volumes:
      # Persist SQLite database
      - nexusbot_data:/app/data
      # Persist logs
      - nexusbot_logs:/var/log/nexusbot
    
    depends_on:
      db:
        condition: service_healthy
      prometheus:
        condition: service_started
    
    networks:
      - nexusbot_network
    
    # Optional: Expose Prometheus metrics
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"

  # PostgreSQL Database (для продакшена)
  db:
    image: postgres:15-alpine
    container_name: nexusbot_db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-nexusbot}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-secure_password_change_me}
      - POSTGRES_DB=${POSTGRES_DB:-nexusbot}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nexusbot} -d ${POSTGRES_DB:-nexusbot}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - nexusbot_network
    # Раскомментируйте только если нужен доступ извне
    # ports:
    #   - "5432:5432"

  # Prometheus for monitoring (опционально)
  prometheus:
    image: prom/prometheus:latest
    container_name: nexusbot_prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - nexusbot_network
    # Раскомментируйте только если нужен доступ к метрикам извне
    # ports:
    #   - "9091:9090"

  # Grafana for visualization (опционально)
  grafana:
    image: grafana/grafana:latest
    container_name: nexusbot_grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - nexusbot_network
    # Раскомментируйте только если нужен доступ к панели управления
    # ports:
    #   - "3000:3000"

volumes:
  nexusbot_data:
    driver: local
  nexusbot_logs:
    driver: local
  postgres_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  nexusbot_network:
    driver: bridge
